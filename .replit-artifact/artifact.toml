kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pip install -q -r /home/runner/workspace/artifacts/api-server/requirements.txt && cd /home/runner/workspace/artifacts/api-server && uvicorn main:app --host 0.0.0.0 --port ${PORT:-8080} --reload"

[services.production]

[services.production.build]
args = ["sh", "-c", "pip install -r /home/runner/workspace/artifacts/api-server/requirements.txt"]

[services.production.run]
args = ["sh", "-c", "cd /home/runner/workspace/artifacts/api-server && uvicorn main:app --host 0.0.0.0 --port ${PORT:-8080}"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/health"
